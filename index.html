<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transferir a Luis Roberto</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #f4f1eb;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 1rem;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 2rem 1.5rem;
    max-width: 340px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .tag { font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; color: #999; margin-bottom: .4rem; }
  h1 { font-size: 1.3rem; margin: 0 0 1.5rem; color: #111; }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: .65rem 0;
    border-bottom: 1px solid #f0ece4;
    gap: .5rem;
  }
  .row:last-of-type { border-bottom: none; }
  .row-left { display: flex; flex-direction: column; gap: .2rem; }
  .row-key { font-size: .65rem; color: #999; text-transform: uppercase; letter-spacing: .06em; }
  .row-val { font-size: .9rem; font-weight: 600; color: #111; }
  .copy-btn {
    flex-shrink: 0;
    padding: .35rem .75rem;
    background: #111;
    color: white;
    font-size: .65rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .copy-btn:active { background: #c8402a; }
  .copy-btn.ok { background: #2a7a4a; }
  .note { font-size: .62rem; color: #bbb; text-align: center; margin-top: 1.2rem; line-height: 1.5; }
  textarea#fb { position:fixed; left:-9999px; top:0; font-size:16px; }
</style>
</head>
<body>
<div class="card">
  <p class="tag">Datos de transferencia</p>
  <h1>Luis Roberto Soto Chenche</h1>

  <div class="row">
    <div class="row-left">
      <span class="row-key">Nombre</span>
      <span class="row-val">LUIS ROBERTO SOTO CHENCHE</span>
    </div>
    <button class="copy-btn" onclick="copiar(this,'LUIS ROBERTO SOTO CHENCHE')">Copiar</button>
  </div>

  <div class="row">
    <div class="row-left">
      <span class="row-key">RUT</span>
      <span class="row-val">24616708-7</span>
    </div>
    <button class="copy-btn" onclick="copiar(this,'24616708-7')">Copiar</button>
  </div>

  <div class="row">
    <div class="row-left">
      <span class="row-key">Banco</span>
      <span class="row-val">Banco Estado</span>
    </div>
    <button class="copy-btn" onclick="copiar(this,'Banco Estado')">Copiar</button>
  </div>

  <div class="row">
    <div class="row-left">
      <span class="row-key">Tipo de cuenta</span>
      <span class="row-val">Cuenta Corriente</span>
    </div>
    <button class="copy-btn" onclick="copiar(this,'Cuenta Corriente')">Copiar</button>
  </div>

  <div class="row">
    <div class="row-left">
      <span class="row-key">N° Cuenta</span>
      <span class="row-val">34800043729</span>
    </div>
    <button class="copy-btn" onclick="copiar(this,'34800043729')">Copiar</button>
  </div>

  <p class="note">Toca "Copiar" en cada campo y pégalo en tu app del banco</p>
</div>

<textarea id="fb"></textarea>

<script>
function copiar(btn, texto) {
  var original = btn.textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(texto).then(function() { ok(btn, original); }).catch(function() { fb(btn, texto, original); });
  } else {
    fb(btn, texto, original);
  }
}
function fb(btn, texto, original) {
  var el = document.getElementById('fb');
  el.style.left = '0';
  el.value = texto;
  el.focus();
  el.select();
  el.setSelectionRange(0, 99999);
  try { document.execCommand('copy'); ok(btn, original); } catch(e) {}
  el.style.left = '-9999px';
}
function ok(btn, original) {
  btn.textContent = '✓';
  btn.classList.add('ok');
  setTimeout(function() { btn.textContent = original; btn.classList.remove('ok'); }, 2000);
}
</script>
</body>
</html>
